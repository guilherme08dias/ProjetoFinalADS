<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - DentalSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow border-0" style="max-width: 400px; width: 100%;">
        <div class="card-body p-5">
            <h4 class="text-center fw-bold mb-4">DentalSystem</h4>
            
            {% if erro %}
            <div class="alert alert-danger py-2 small text-center">{{ erro }}</div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Entrar</button>
            </form>
            <div class="mt-3 text-center small text-muted">
                Demo: admin@dentalsystem.com / admin
            </div>
        </div>
    </div>
</body>
</html>
