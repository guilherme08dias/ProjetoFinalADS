{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h1>✏️ Editar Agendamento</h1>

    <div class="row mt-4">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form method="POST" novalidate>
                        {{ csrf_token() }}

                        <div class="mb-3">
                            <label for="paciente_nome" class="form-label">Nome do Paciente</label>
                            <input type="text" class="form-control" id="paciente_nome" name="paciente_nome"
                                value="{{ agendamento.paciente_nome }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="dentista_responsavel" class="form-label">Dentista Responsável</label>
                            <input type="text" class="form-control" id="dentista_responsavel"
                                name="dentista_responsavel" value="{{ agendamento.dentista_responsavel }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="servico_tipo" class="form-label">Tipo de Serviço</label>
                            <select class="form-control" id="servico_tipo" name="servico_tipo" required>
                                <option value="Consulta" {% if agendamento.servico_tipo=='Consulta' %}selected{% endif
                                    %}>Consulta</option>
                                <option value="Limpeza" {% if agendamento.servico_tipo=='Limpeza' %}selected{% endif %}>
                                    Limpeza</option>
                                <option value="Restauração" {% if agendamento.servico_tipo=='Restauração' %}selected{%
                                    endif %}>Restauração</option>
                                <option value="Extração" {% if agendamento.servico_tipo=='Extração' %}selected{% endif
                                    %}>Extração</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="data_hora" class="form-label">Data e Hora</label>
                            <input type="datetime-local" class="form-control" id="data_hora" name="data_hora"
                                value="{{ agendamento.data_hora.strftime('%Y-%m-%dT%H:%M') }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="status" class="form-label">Status</label>
                            <select class="form-control" id="status" name="status" required>
                                <option value="pendente" {% if agendamento.status=='pendente' %}selected{% endif %}>
                                    Pendente</option>
                                <option value="confirmado" {% if agendamento.status=='confirmado' %}selected{% endif %}>
                                    Confirmado</option>
                                <option value="realizado" {% if agendamento.status=='realizado' %}selected{% endif %}>
                                    Realizado</option>
                                <option value="cancelado" {% if agendamento.status=='cancelado' %}selected{% endif %}>
                                    Cancelado</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="observacoes" class="form-label">Observações</label>
                            <textarea class="form-control" id="observacoes" name="observacoes"
                                rows="4">{{ agendamento.observacoes }}</textarea>
                        </div>

                        <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
