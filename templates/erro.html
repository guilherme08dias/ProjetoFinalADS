{% extends "base.html" %}

{% block content %}
<div class="container mt-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger shadow">
                <div class="card-body p-5">
                    <h1 class="display-1 text-danger fw-bold">{{ codigo }}</h1>
                    <h2 class="mb-4">{{ mensagem }}</h2>
                    <p class="text-muted">Ocorreu um erro ao processar sua solicitação.</p>
                    <a href="{{ url_for('index') }}" class="btn btn-primary mt-3">Voltar para o Início</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
