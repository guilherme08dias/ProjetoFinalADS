<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentalSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row flex-nowrap">
            <!-- Sidebar -->
            <div class="col-auto col-md-3 col-xl-2 px-sm-2 px-0 bg-white border-end" style="min-height: 100vh;">
                <div class="d-flex flex-column align-items-center align-items-sm-start px-3 pt-2 text-white min-vh-100">
                    <a href="/" class="d-flex align-items-center pb-3 mb-md-0 me-md-auto text-decoration-none border-bottom w-100">
                        <span class="fs-5 d-none d-sm-inline text-primary fw-bold">DentalSystem</span>
                    </a>
                    <ul class="nav nav-pills flex-column mb-sm-auto mb-0 align-items-center align-items-sm-start w-100 mt-4">
                        <li class="nav-item w-100">
                            <a href="/" class="nav-link align-middle px-0 w-100 text-start ps-2 active">
                                <i class="bi bi-speedometer2"></i> <span class="ms-1 d-none d-sm-inline">Dashboard</span>
                            </a>
                        </li>
                        <li class="nav-item w-100 mt-2">
                             <a href="#" class="nav-link align-middle px-0 w-100 text-start ps-2 text-muted">
                                <i class="bi bi-calendar"></i> <span class="ms-1 d-none d-sm-inline">Agenda (Etapa 3)</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
            <!-- Conteúdo -->
            <div class="col py-3 bg-light">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
